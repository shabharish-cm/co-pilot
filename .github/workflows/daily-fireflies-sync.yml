name: Daily Fireflies Sync

on:
  schedule:
    # 1:00 AM IST = 19:30 UTC (previous day)
    - cron: '30 19 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run Fireflies sync
        run: npm run sync:fireflies
        env:
          FIREFLIES_API_KEY:  ${{ secrets.FIREFLIES_API_KEY }}
          TIMEZONE:           Asia/Kolkata

      - name: Commit transcript data
        run: |
          git config user.name  "pm-copilot-bot"
          git config user.email "bot@pm-copilot"
          git add pulse/raw/ pulse/normalized/ state/transcript_index.json state/last_sync.json
          git diff --staged --quiet || git commit -m "chore: fireflies sync $(date -u +%Y-%m-%d)"
          git push
