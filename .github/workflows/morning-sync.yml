name: Morning Sync

on:
  schedule:
    # 6:00 AM IST = 0:30 UTC
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run morning sync
        run: npm run sync:morning
        env:
          TODOIST_API_TOKEN:  ${{ secrets.TODOIST_API_TOKEN }}
          GCAL_CLIENT_ID:     ${{ secrets.GCAL_CLIENT_ID }}
          GCAL_CLIENT_SECRET: ${{ secrets.GCAL_CLIENT_SECRET }}
          GCAL_REFRESH_TOKEN: ${{ secrets.GCAL_REFRESH_TOKEN }}
          GCAL_CALENDAR_ID:   ${{ secrets.GCAL_CALENDAR_ID }}
          TODOIST_PROJECT_ID: ${{ secrets.TODOIST_PROJECT_ID }}
          TIMEZONE:           Asia/Kolkata

      - name: Commit updated state
        run: |
          git config user.name  "pm-copilot-bot"
          git config user.email "bot@pm-copilot"
          git add state/current_day.json state/last_sync.json daily/raw/
          git diff --staged --quiet || git commit -m "chore: morning sync $(date -u +%Y-%m-%d)"
          git push
